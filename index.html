<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>営業ルート最適化ツール</title>
<link rel="icon" type="image/png" href="icons/favicon.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#bae1f2">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%);
  color: #fff;
  padding: 7px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.03em; }
.container {
  display: flex;
  height: calc(100vh - 40px);
}
.sidebar {
  width: 340px;
  min-width: 340px;
  background: #fff;
  border-right: 1px solid #e5e7eb;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-inner {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.section-label {
  font-size: 12px;
  font-weight: 600;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
textarea {
  width: 100%;
  height: 200px;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  padding: 10px;
  font-size: 13px;
  line-height: 1.7;
  resize: vertical;
  outline: none;
  color: #111;
  transition: border-color 0.15s;
}
textarea:focus { border-color: #2563eb; }
.hint {
  font-size: 11px;
  color: #9ca3af;
  margin-top: 4px;
  line-height: 1.5;
}
.start-row {
  margin-top: 14px;
}
.start-row input {
  width: 100%;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 13px;
  outline: none;
  color: #111;
  transition: border-color 0.15s;
}
.start-row input:focus { border-color: #2563eb; }
.btn-calc {
  width: 100%;
  margin-top: 14px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 11px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-calc:hover { background: #1d4ed8; }
.btn-calc:disabled { background: #93c5fd; cursor: not-allowed; }
.status {
  font-size: 12px;
  color: #6b7280;
  margin-top: 10px;
  min-height: 18px;
  text-align: center;
}
.status.error { color: #dc2626; }
.status.ok { color: #16a34a; }
.failed-box {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: #b91c1c;
  margin-top: 8px;
  line-height: 1.7;
}
.failed-box .failed-title { font-weight: 600; }
.divider {
  border: none;
  border-top: 1px solid #e5e7eb;
  margin: 14px 0;
}
.route-list { list-style: none; }
.route-list li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid #f3f4f6;
  font-size: 13px;
  color: #111;
}
.route-list li:last-child { border-bottom: none; }
.btn-exclude {
  margin-left: auto;
  flex-shrink: 0;
  background: none;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  color: #9ca3af;
  font-size: 11px;
  padding: 2px 7px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.btn-exclude:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
.badge {
  min-width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #2563eb;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.badge.start { background: #16a34a; }
.addr-text { line-height: 1.5; }
.addr-link { color: #2563eb; text-decoration: underline; }
.addr-link:active { color: #1d4ed8; }
.addr-text .dist {
  font-size: 11px;
  color: #9ca3af;
  margin-top: 2px;
}
.addr-match {
  font-size: 11px;
  color: #9ca3af;
  margin-top: 2px;
}
/* 訪問済みチェック */
.visit-check {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  margin-top: 2px;
  accent-color: #16a34a;
  cursor: pointer;
}
.visit-spacer {
  width: 22px;
  flex-shrink: 0;
}
.route-list li.visited .addr-text { color: #9ca3af; }
.route-list li.visited .addr-link { color: #9ca3af; text-decoration: line-through; }
.route-list li.visited .badge { background: #9ca3af; }
#visitedRow {
  background: #eff6ff;
  border-color: #bfdbfe;
  color: #1d4ed8;
  margin-top: 8px;
}
.btn-nav {
  display: block;
  text-align: center;
  background: #16a34a;
  color: #fff;
  border-radius: 8px;
  padding: 10px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  margin-top: 8px;
  transition: background 0.15s;
}
.btn-nav:hover { background: #15803d; }
.btn-restore:hover { background: #dcfce7; color: #16a34a; border-color: #86efac; }
.excluded-addr { color: #9ca3af; }
.goal-row { margin-top: 0; }
.toggle-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #374151;
  cursor: pointer;
  user-select: none;
}
.toggle-label input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
.goal-row input[type="text"] {
  width: 100%;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 13px;
  outline: none;
  color: #111;
  transition: border-color 0.15s;
}
.goal-row input[type="text"]:focus { border-color: #2563eb; }
.mode-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.mode-row select {
  flex: 1;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  padding: 9px 10px;
  font-size: 13px;
  color: #111;
  background: #fff;
  outline: none;
}
.stay-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
}
.stay-wrap input {
  width: 100%;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  padding: 9px 10px;
  font-size: 13px;
  color: #111;
  outline: none;
}
.stay-wrap span { font-size: 12px; color: #6b7280; white-space: nowrap; }
.badge.goal { background: #dc2626; }
.total-row {
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  color: #166534;
  font-weight: 600;
  margin-top: 10px;
}
#map {
  flex: 1;
}
@media (max-width: 640px) {
  .container { flex-direction: column; }
  .sidebar { width: 100%; min-width: 0; height: 50vh; border-right: none; border-bottom: 1px solid #e5e7eb; }
  #map { height: 50vh; }
}
.btn-pdf, .btn-qr, .btn-mail, .btn-share {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  padding: 5px;
  width: 30px;
  height: 30px;
  cursor: pointer;
  display: none;
  transition: background 0.15s;
  line-height: 0;
}
.btn-qr { margin-left: auto; }
.btn-pdf:hover, .btn-qr:hover, .btn-mail:hover, .btn-share:hover { background: rgba(255,255,255,0.28); }
/* QRモーダル */
#qrModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 10000;
  align-items: center;
  justify-content: center;
}
#qrBox {
  background: #fff;
  border-radius: 14px;
  padding: 28px 32px;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  max-width: 860px;
  width: 90%;
}
#qrBox h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: #111; }
#qrBox p { font-size: 12px; color: #6b7280; margin-bottom: 14px; line-height: 1.6; }
#qrImg { width: 100%; max-width: 700px; height: auto; border: 1px solid #e5e7eb; border-radius: 8px; }
#qrNote { font-size: 11px; color: #9ca3af; margin-top: 10px; margin-bottom: 0; }
#qrMeta { font-size: 11px; color: #9ca3af; margin-top: 8px; line-height: 1.7; }
.addr-info { font-size: 11px; color: #6b7280; margin-top: 3px; }
.btn-qr-close {
  margin-top: 18px;
  background: #f3f4f6;
  border: none;
  border-radius: 8px;
  padding: 9px 24px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: #374151;
}
.btn-qr-close:hover { background: #e5e7eb; }
</style>
</head>
<body>
<header>
  <h1>営業ルート最適化</h1>
  <button class="btn-qr" id="qrBtn" onclick="showQR()" title="QRコード">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="5" y="5" width="3" height="3" fill="currentColor" stroke="none"/><rect x="16" y="5" width="3" height="3" fill="currentColor" stroke="none"/><rect x="5" y="16" width="3" height="3" fill="currentColor" stroke="none"/>
      <path d="M14 14h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z" fill="currentColor" stroke="none"/>
    </svg>
  </button>
  <button class="btn-share" id="shareBtn" onclick="shareRoute()" title="スマホに送る">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
    </svg>
  </button>
  <button class="btn-mail" id="mailBtn" onclick="sendEmail()" title="メールで送る">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
    </svg>
  </button>
  <button class="btn-pdf" id="pdfBtn" onclick="startPrint()" title="PDFに保存">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
      <line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/><line x1="9" y1="9" x2="11" y2="9"/>
    </svg>
  </button>
</header>

<!-- QRコードモーダル -->
<div id="qrModal">
  <div id="qrBox">
    <h3 id="qrTitle">住所リストをスキャン</h3>
    <p id="qrDesc"></p>
    <img id="qrImg" src="" alt="QRコード">
    <div id="qrNote"></div>
    <div id="qrMeta"></div>
    <button class="btn-qr-close" onclick="closeQR()">閉じる</button>
  </div>
</div>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-inner">
      <div class="print-hide">
        <div class="section-label">出発地</div>
        <div class="start-row">
          <input type="text" id="startAddr" placeholder="例: 東京都大田区蒲田5-13-26">
        </div>

        <div class="section-label" style="margin-top:16px;">ゴール地点</div>
        <div class="goal-row">
          <label class="toggle-label">
            <input type="checkbox" id="goalSameAsStart" checked onchange="toggleGoalInput()">
            <span>出発地に戻る</span>
          </label>
          <input type="text" id="goalAddr" placeholder="例: 東京都大田区蒲田5-13-26" style="display:none; margin-top:8px;">
        </div>

        <div class="section-label" style="margin-top:16px;">移動手段・滞在時間</div>
        <div class="mode-row">
          <select id="travelMode" onchange="onModeChange()">
            <option value="car">車</option>
            <option value="walk">徒歩</option>
          </select>
          <div class="stay-wrap">
            <input type="number" id="stayMin" min="0" max="180" value="10">
            <span>分/件</span>
          </div>
        </div>

        <div class="section-label" style="margin-top:16px;">訪問先住所リスト</div>
        <textarea id="addrInput" placeholder="スプレッドシートからコピー貼り付け：
名前 住所 空家ID 種別

住所のみでも可：
東京都大田区池上1-1-1"></textarea>
        <div class="hint">スプレッドシートからそのまま貼り付けOK（名前・住所・空家ID・種別 の順）。住所のみも対応（最大30件）</div>

        <button class="btn-calc" id="calcBtn" onclick="calcRoute()">ルートを計算する</button>
        <div class="status" id="statusMsg"></div>
        <div class="failed-box" id="failedBox" style="display:none"></div>
      </div>

      <hr class="divider" id="resultDivider" style="display:none">
      <div id="resultArea" style="display:none">
        <div class="section-label">最適訪問順</div>
        <ul class="route-list" id="routeList"></ul>
        <div class="total-row" id="totalRow"></div>
        <div class="total-row" id="visitedRow" style="display:none"></div>
        <div id="navArea" class="print-hide"></div>
      </div>
      <div id="excludedArea" class="print-hide" style="display:none">
        <hr class="divider">
        <div class="section-label">除外した訪問先</div>
        <ul class="route-list" id="excludedList"></ul>
      </div>
    </div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode_UTF8.js"></script>
<script>
function toggleGoalInput() {
  var same = document.getElementById('goalSameAsStart').checked;
  document.getElementById('goalAddr').style.display = same ? 'none' : 'block';
}

// 入力内容を localStorage に自動保存・復元
var STORAGE_KEY = 'eigyouroot-inputs';
function saveInputs() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      s: document.getElementById('startAddr').value,
      gs: document.getElementById('goalSameAsStart').checked,
      g: document.getElementById('goalAddr').value,
      a: document.getElementById('addrInput').value,
      m: document.getElementById('travelMode').value,
      st: document.getElementById('stayMin').value
    }));
  } catch (e) {}
}
function loadInputs() {
  try {
    var saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!saved) return;
    document.getElementById('startAddr').value = saved.s || '';
    document.getElementById('goalSameAsStart').checked = saved.gs !== false;
    document.getElementById('goalAddr').value = saved.g || '';
    document.getElementById('addrInput').value = saved.a || '';
    if (saved.m) document.getElementById('travelMode').value = saved.m;
    if (saved.st !== undefined && saved.st !== '') document.getElementById('stayMin').value = saved.st;
    toggleGoalInput();
  } catch (e) {}
}

// 訪問済みチェックの状態を localStorage に保存（当日限り有効。翌日は自動リセット）
var VISITED_KEY = 'eigyouroot-visited';
function todayStr() {
  var n = new Date();
  var pad = function(x) { return String(x).padStart(2, '0'); };
  return n.getFullYear() + '-' + pad(n.getMonth() + 1) + '-' + pad(n.getDate());
}
function loadVisited() {
  try {
    var d = JSON.parse(localStorage.getItem(VISITED_KEY));
    if (d && d.date === todayStr()) return d.addrs || {};
  } catch (e) {}
  return {};
}
var visitedAddrs = loadVisited();
function saveVisited() {
  try {
    localStorage.setItem(VISITED_KEY, JSON.stringify({ date: todayStr(), addrs: visitedAddrs }));
  } catch (e) {}
}

var map = L.map('map').setView([35.9037, 139.6233], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a>'
}).addTo(map);

var markers = [];
var polylines = [];
var markerByAddr = {}; // 訪問済みトグルでピンの色を変えるための参照

// ジオコーディング結果キャッシュ
var cachedStartPoint = null;
var cachedGoalPoint = null;
var cachedGoalSame = true;
var cachedPoints = []; // 訪問先（除外済みを含まない）
var excludedEntries = []; // 除外した訪問先 { point, line }（「戻す」用）

// ---------- 印刷（1ページ目=訪問リスト / 2ページ目=地図画像） ----------
// 画面のLeaflet地図は印刷時にタイルが描画されず崩れるため、
// タイルをcanvasに描き直した静的画像と専用HTMLを組み立てて印刷する

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

// Webメルカトル: 緯度経度 → 指定ズームでのワールドピクセル座標
function worldPx(lat, lng, zoom) {
  var scale = 256 * Math.pow(2, zoom);
  var sin = Math.sin(lat * Math.PI / 180);
  return {
    x: (lng + 180) / 360 * scale,
    y: (0.5 - Math.log((1 + sin) / (1 - sin)) / (4 * Math.PI)) * scale
  };
}

function drawPrintPin(ctx, x, y, color, label) {
  ctx.beginPath();
  ctx.arc(x, y, 16, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#fff';
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 15px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y + 1);
}

// ルート全体が収まる静的地図をcanvasに描いて dataURL を返す（失敗時は null）
function renderPrintMap(routeWithGoal, startPoint, goalPoint, width, height) {
  return new Promise(function(resolve) {
    var pad = 70;
    var lats = routeWithGoal.map(function(p) { return p.lat; });
    var lngs = routeWithGoal.map(function(p) { return p.lng; });
    var minLat = Math.min.apply(null, lats), maxLat = Math.max.apply(null, lats);
    var minLng = Math.min.apply(null, lngs), maxLng = Math.max.apply(null, lngs);

    // ルートの範囲が余白込みで収まる最大ズームを選ぶ
    var zoom, tl, br;
    for (zoom = 18; zoom > 3; zoom--) {
      tl = worldPx(maxLat, minLng, zoom);
      br = worldPx(minLat, maxLng, zoom);
      if (br.x - tl.x <= width - pad * 2 && br.y - tl.y <= height - pad * 2) break;
    }
    var originX = (tl.x + br.x) / 2 - width / 2;
    var originY = (tl.y + br.y) / 2 - height / 2;

    // 印刷で文字がにじまないよう、キャンバスは2倍解像度で描く
    // （レイアウト計算は等倍のまま、描画だけ2倍に拡大する）
    var canvas = document.createElement('canvas');
    canvas.width = width * 2;
    canvas.height = height * 2;
    var ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    ctx.fillStyle = '#e5e7eb';
    ctx.fillRect(0, 0, width, height);

    // 高解像度（@2x）タイル: 日本語ラベルが濃いosm.jpを優先し、CARTO→OSM標準の順で代替
    function tileURLs(zoom, x, y) {
      return [
        'https://tile.openstreetmap.jp/styles/osm-bright-ja/' + zoom + '/' + x + '/' + y + '@2x.png',
        'https://basemaps.cartocdn.com/rastertiles/voyager/' + zoom + '/' + x + '/' + y + '@2x.png',
        'https://tile.openstreetmap.org/' + zoom + '/' + x + '/' + y + '.png'
      ];
    }

    // 候補URLを順に試してタイル1枚を描く（全滅したらスキップ）
    function drawTile(urls, dx, dy, done) {
      var i = 0;
      (function tryNext() {
        if (i >= urls.length) { done(); return; }
        var img = new Image();
        img.crossOrigin = 'anonymous';
        var timer = setTimeout(function() { img.src = ''; i++; tryNext(); }, 8000);
        img.onload = function() {
          clearTimeout(timer);
          ctx.drawImage(img, dx, dy, 256, 256);
          done();
        };
        img.onerror = function() { clearTimeout(timer); i++; tryNext(); };
        img.src = urls[i];
      })();
    }

    // 必要なタイルの一覧を作り、同時6件までに絞って読み込む
    // （一斉リクエストするとタイルサーバー側で失敗が増え、代替スタイルとのツギハギになるため）
    var maxTile = Math.pow(2, zoom);
    var tiles = [];
    for (var tx = Math.floor(originX / 256); tx <= Math.floor((originX + width) / 256); tx++) {
      for (var ty = Math.floor(originY / 256); ty <= Math.floor((originY + height) / 256); ty++) {
        if (ty < 0 || ty >= maxTile) continue;
        tiles.push({ tx: tx, ty: ty });
      }
    }
    var nextTile = 0;
    function tileWorker() {
      return new Promise(function(finish) {
        (function next() {
          if (nextTile >= tiles.length) { finish(); return; }
          var t = tiles[nextTile++];
          drawTile(
            tileURLs(zoom, (t.tx % maxTile + maxTile) % maxTile, t.ty),
            Math.round(t.tx * 256 - originX), Math.round(t.ty * 256 - originY), next);
        })();
      });
    }
    var workers = [];
    for (var w = 0; w < Math.min(6, tiles.length); w++) workers.push(tileWorker());

    Promise.all(workers).then(function() {
      var toXY = function(p) {
        var w = worldPx(p.lat, p.lng, zoom);
        return { x: w.x - originX, y: w.y - originY };
      };

      // ルート線
      ctx.beginPath();
      routeWithGoal.forEach(function(p, i) {
        var c = toXY(p);
        if (i === 0) ctx.moveTo(c.x, c.y);
        else ctx.lineTo(c.x, c.y);
      });
      ctx.strokeStyle = '#2563eb';
      ctx.lineWidth = 4;
      ctx.globalAlpha = 0.75;
      ctx.stroke();
      ctx.globalAlpha = 1;

      // ピン（画面の地図と同じ配色。訪問済みはグレー）
      var ordered = goalPoint ? routeWithGoal.slice(0, -1) : routeWithGoal;
      ordered.forEach(function(p, idx) {
        var isStart = idx === 0 && startPoint;
        var visited = !isStart && visitedAddrs[p.original];
        var color = isStart ? '#16a34a' : (visited ? '#9ca3af' : '#2563eb');
        var label = isStart ? 'S' : String(idx + (startPoint ? 0 : 1));
        var c = toXY(p);
        drawPrintPin(ctx, c.x, c.y, color, label);
      });
      if (goalPoint && !cachedGoalSame) {
        var g = toXY(goalPoint);
        drawPrintPin(ctx, g.x, g.y, '#dc2626', 'G');
      }

      // 出典表記（OpenStreetMap・CARTOの利用規約上必須）
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'bottom';
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.fillRect(width - 300, height - 24, 300, 24);
      ctx.fillStyle = '#333';
      ctx.fillText('© OpenStreetMap contributors © CARTO', width - 8, height - 6);

      try {
        resolve(canvas.toDataURL('image/jpeg', 0.9));
      } catch (e) {
        resolve(null); // タイルのCORS問題などでcanvasが汚染された場合
      }
    });
  });
}

  var pad = function(n) { return String(n).padStart(2, '0'); };
  var dateStr = now.getFullYear() + '/' + pad(now.getMonth()+1) + '/' + pad(now.getDate());

  var rows = '';
  routeWithGoal.forEach(function(p, idx) {
    var isStart = idx === 0 && startPoint;
    var isGoalEntry = goalPoint && idx === routeWithGoal.length - 1;
    var num = isStart ? 'S' : (isGoalEntry ? 'G' : String(idx + (startPoint ? 0 : 1)));
    var badgeClass = isStart ? ' start' : (isGoalEntry ? ' goal' : '');
    var visited = !isStart && !isGoalEntry && visitedAddrs[p.original];
    var info = [p.name, p.vacId, p.type].filter(Boolean).join(' ｜ ');
    var nextP = idx < routeWithGoal.length - 1 ? routeWithGoal[idx + 1] : null;
    rows += '<tr' + (visited ? ' class="visited"' : '') + '>'
      + '<td class="chk">' + (isStart || isGoalEntry ? '' : (visited ? '☑' : '☐')) + '</td>'
      + '<td class="num"><span class="badge' + badgeClass + '">' + num + '</span></td>'
      + '<td class="addr">' + escapeHTML(p.original)
      + (info ? '<span class="info">' + escapeHTML(info) + '</span>' : '') + '</td>'
      + '<td class="dist">' + (nextP ? '次まで ' + dist(p, nextP).toFixed(1) + ' km' : '') + '</td>'
      + '</tr>';
  });

  var totals = totalsLines().map(function(t) { return '<div>' + escapeHTML(t) + '</div>'; }).join('');

  return '<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">'
    + '<title>' + dateStr + ' 訪問ルート</title><style>'
    + '@page { size: A4 portrait; margin: 10mm 12mm; }'
    // print-color-adjust: 印刷設定の「背景のグラフィック」がOFFでも番号バッジの色を出す
    + '* { margin: 0; padding: 0; box-sizing: border-box; print-color-adjust: exact; -webkit-print-color-adjust: exact; }'
    // 日本語が明朝やビットマップ系に落ちないよう、印刷がきれいなゴシック体を明示する
    + 'body { font-family: -apple-system, "Hiragino Sans", "Meiryo", "Yu Gothic", sans-serif; color: #111; font-size: 10.5px; }'
    + 'h1 { font-size: 14px; margin-bottom: 2px; }'
    + '.date { color: #555; margin-bottom: 8px; font-size: 10.5px; }'
    + 'table { width: 100%; border-collapse: collapse; }'
    + 'tr { page-break-inside: avoid; }'
    + 'td { border-bottom: 1px solid #ddd; padding: 3px 4px; vertical-align: middle; }'
    + '.chk { width: 20px; font-size: 13px; }'
    + '.num { width: 24px; }'
    + '.badge { display: inline-block; width: 16px; height: 16px; border-radius: 50%; background: #2563eb; color: #fff; text-align: center; line-height: 16px; font-weight: 700; font-size: 9.5px; }'
    + '.badge.start { background: #16a34a; } .badge.goal { background: #dc2626; }'
    + 'tr.visited .addr { color: #9ca3af; text-decoration: line-through; }'
    + '.info { color: #555; font-size: 9.5px; margin-left: 8px; }'
    + '.dist { color: #666; white-space: nowrap; text-align: right; width: 80px; font-size: 10px; }'
    + '.totals { margin-top: 8px; border: 1px solid #bbb; border-radius: 4px; padding: 6px 10px; font-weight: 600; line-height: 1.6; }'
    + '.map-page { page-break-before: always; break-before: page; }'
    + '.map-page img { width: 100%; }'
    + '.map-fail { padding: 20px; color: #b91c1c; }'
    + '</style></head><body>'
    + '<h1>訪問ルート</h1>'
    + '<div class="date">' + dateStr
    + (startPoint ? '　　出発地: ' + escapeHTML(startPoint.original) : '') + '</div>'
    + '<table>' + rows + '</table>'
    + (totals ? '<div class="totals">' + totals + '</div>' : '')
    + (mapUrl
        ? '<div class="map-page"><img src="' + mapUrl + '"></div>'
        : '<div class="map-page map-fail">地図画像を作成できませんでした（リストのみ印刷されます）</div>')
    + '</body></html>';
}

function openPrintFrame(html) {
  var old = document.getElementById('printFrame');
  if (old) old.remove();
  var f = document.createElement('iframe');
  f.id = 'printFrame';
  f.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
  document.body.appendChild(f);
  var doc = f.contentDocument;
  doc.open();
  doc.write(html);
  doc.close();
  // dataURL画像のデコード完了を待ってから印刷ダイアログを開く
  setTimeout(function() {
    f.contentWindow.focus();
    f.contentWindow.print();
  }, 500);
}

function startPrint() {
  if (!cachedPoints || cachedPoints.length === 0) return;
  var startPoint = cachedStartPoint;
  var goalPoint = cachedGoalPoint;
  var base = startPoint || cachedPoints[0];
  var targets = startPoint ? cachedPoints : cachedPoints.slice(1);
  var ordered = computeRoute(base, targets, goalPoint);
  var routeWithGoal = goalPoint ? ordered.concat([goalPoint]) : ordered;

  setStatus('印刷ページを作成中...');
  renderPrintMap(routeWithGoal, startPoint, goalPoint, 1400, 1800).then(function(mapUrl) {
    openPrintFrame(buildPrintHTML(routeWithGoal, startPoint, goalPoint, mapUrl));
    setStatus('', '');
  });
}

function clearMap() {
  markers.forEach(function(m) { map.removeLayer(m); });
  polylines.forEach(function(p) { map.removeLayer(p); });
  markers = [];
  polylines = [];
  markerByAddr = {};
}

function setStatus(msg, type) {
  var el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

// 番地形式（一丁目11番13号）→ 数字ハイフン形式（1-11-13）に変換
function normalizeAddress(addr) {
  function kanjiToNum(s) {
    if (/^\d+$/.test(s)) return parseInt(s);
    var k = {'〇':0,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};
    var n = 0;
    var tmp = s.replace(/([一二三四五六七八九]?)十([一二三四五六七八九]?)/g, function(_, a, b) {
      n += (a ? k[a] : 1) * 10 + (b ? k[b] : 0);
      return '';
    });
    for (var i = 0; i < tmp.length; i++) {
      if (k[tmp[i]] !== undefined) n += k[tmp[i]];
    }
    return n;
  }
  var p = '([一二三四五六七八九〇十]+|\\d+)';
  return addr
    .replace(new RegExp(p + '丁目', 'g'), function(_, n) { return kanjiToNum(n) + '-'; })
    .replace(new RegExp(p + '番地', 'g'), function(_, n) { return kanjiToNum(n) + '-'; })
    .replace(new RegExp(p + '番',   'g'), function(_, n) { return kanjiToNum(n) + '-'; })
    .replace(new RegExp(p + '号',   'g'), function(_, n) { return kanjiToNum(n); })
    .replace(/-$/, '');
}

// 国土地理院 住所検索API（日本住所専用・APIキー不要）
async function geocode(address) {
  var normalized = normalizeAddress(address);
  var controller = new AbortController();
  var timeoutId = setTimeout(function() { controller.abort(); }, 15000);
  try {
    var url = 'https://msearch.gsi.go.jp/address-search/AddressSearch?q=' + encodeURIComponent(normalized);
    var res = await fetch(url, { signal: controller.signal });
    var data = await res.json();
    clearTimeout(timeoutId);
    if (!data.length) return null;
    var coords = data[0].geometry.coordinates; // [lng, lat]
    return { lat: coords[1], lng: coords[0], label: data[0].properties.title };
  } catch (e) {
    clearTimeout(timeoutId);
    return null;
  }
}

function dist(a, b) {
  var R = 6371;
  var dLat = (b.lat - a.lat) * Math.PI / 180;
  var dLng = (b.lng - a.lng) * Math.PI / 180;
  var x = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(a.lat * Math.PI / 180) * Math.cos(b.lat * Math.PI / 180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

// 複数住所を並列ジオコーディング（同時5件まで）。失敗は null のまま返す
async function geocodeAll(lineInfos, onProgress) {
  var results = new Array(lineInfos.length);
  var nextIdx = 0;
  async function worker() {
    while (nextIdx < lineInfos.length) {
      var i = nextIdx++;
      results[i] = await geocode(lineInfos[i].addr);
      onProgress();
    }
  }
  var workers = [];
  var n = Math.min(5, lineInfos.length);
  for (var w = 0; w < n; w++) workers.push(worker());
  await Promise.all(workers);
  return results;
}

// 最近傍法（ゴール地点を考慮: 残り1件はゴールに最も近いものを優先）
function nearestNeighbor(start, points, goal) {
  var remaining = points.slice();
  var route = [start];
  var current = start;
  while (remaining.length > 0) {
    var minD = Infinity, minIdx = 0;
    for (var i = 0; i < remaining.length; i++) {
      var d = dist(current, remaining[i]);
      // 残り1件になったらゴールへの距離も加算して最適な「締め方」を選ぶ
      if (goal && remaining.length === 1) {
        d = d + dist(remaining[i], goal);
      }
      if (d < minD) { minD = d; minIdx = i; }
    }
    route.push(remaining[minIdx]);
    current = remaining[minIdx];
    remaining.splice(minIdx, 1);
  }
  return route;
}

// 2-opt改善: 経路の交差する区間を反転して総距離を短縮する
// route[0]（出発地）は固定。goal があれば末尾→ゴールの距離も考慮する
function twoOpt(route, goal) {
  var n = route.length;
  var improved = true;
  var guard = 0;
  while (improved && guard < 100) {
    improved = false;
    guard++;
    for (var i = 1; i < n - 1; i++) {
      for (var j = i + 1; j < n; j++) {
        var after = (j + 1 < n) ? route[j + 1] : goal;
        var costBefore = dist(route[i - 1], route[i]) + (after ? dist(route[j], after) : 0);
        var costAfter  = dist(route[i - 1], route[j]) + (after ? dist(route[i], after) : 0);
        if (costAfter < costBefore - 1e-9) {
          var seg = route.slice(i, j + 1).reverse();
          for (var k = 0; k < seg.length; k++) route[i + k] = seg[k];
          improved = true;
        }
      }
    }
  }
  return route;
}

// 最近傍法で初期ルートを作り、2-optで改善する
function computeRoute(base, targets, goal) {
  return twoOpt(nearestNeighbor(base, targets, goal), goal);
}

function totalDist(route, goal) {
  var total = 0;
  for (var i = 1; i < route.length; i++) {
    total += dist(route[i-1], route[i]);
  }
  if (goal) total += dist(route[route.length - 1], goal);
  return total;
}

function fmtDur(min) {
  min = Math.round(min);
  var h = Math.floor(min / 60);
  var m = min % 60;
  return h > 0 ? h + '時間' + (m > 0 ? m + '分' : '') : m + '分';
}

// 直線距離からの概算移動時間（分）。道路の迂回係数と平均速度で換算する
// OSRMの実道路データが取れるまでのつなぎ・フォールバック用
function estimateTravelMinutes(straightKm, mode) {
  if (mode === 'walk') return straightKm * 1.2 / 4.8 * 60; // 徒歩4.8km/h・迂回1.2倍
  return straightKm * 1.3 / 25 * 60; // 市街地の車25km/h・迂回1.3倍
}

// OSRMデモサーバーで実道路の距離・所要時間を取得（失敗時はnull）
async function fetchRoadInfo(routePts) {
  try {
    var mode = document.getElementById('travelMode').value;
    var base = mode === 'walk'
      ? 'https://routing.openstreetmap.de/routed-foot/route/v1/foot/'
      : 'https://router.project-osrm.org/route/v1/driving/';
    var coords = routePts.map(function(p) { return p.lng + ',' + p.lat; }).join(';');
    var controller = new AbortController();
    var t = setTimeout(function() { controller.abort(); }, 10000);
    var res = await fetch(base + coords + '?overview=false', { signal: controller.signal });
    var data = await res.json();
    clearTimeout(t);
    if (!data.routes || !data.routes.length) return null;
    return { km: data.routes[0].distance / 1000, minutes: data.routes[0].duration / 60 };
  } catch (e) {
    return null;
  }
}

var lastTotals = null; // { straightKm, visitCount, hasGoal, road }
var roadReqId = 0;

function totalsLines() {
  if (!lastTotals) return [];
  var mode = document.getElementById('travelMode').value;
  var stayPer = parseInt(document.getElementById('stayMin').value, 10);
  if (isNaN(stayPer) || stayPer < 0) stayPer = 0;
  var travelMin, distLine;
  if (lastTotals.road) {
    travelMin = lastTotals.road.minutes;
    distLine = '合計距離（道路）: ' + lastTotals.road.km.toFixed(1) + ' km';
  } else {
    travelMin = estimateTravelMinutes(lastTotals.straightKm, mode);
    distLine = '合計距離（直線）: ' + lastTotals.straightKm.toFixed(1) + ' km';
  }
  var stayTotal = stayPer * lastTotals.visitCount;
  return [
    distLine + ' / 訪問 ' + lastTotals.visitCount + '件' + (lastTotals.hasGoal ? '（帰路含む）' : ''),
    '概算所要時間: 約' + fmtDur(travelMin + stayTotal),
    '（移動 ' + fmtDur(travelMin) + ' + 滞在 ' + fmtDur(stayTotal) + '）'
  ];
}

function renderTotals() {
  var ls = totalsLines();
  if (!ls.length) return;
  var el = document.getElementById('totalRow');
  el.innerHTML = '';
  ls.forEach(function(t) {
    var d = document.createElement('div');
    d.textContent = t;
    el.appendChild(d);
  });
}

function onModeChange() {
  saveInputs();
  if (cachedPoints.length > 0) drawRoute();
}

async function calcRoute() {
  var btn = document.getElementById('calcBtn');
  btn.disabled = true;
  clearMap();
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('resultDivider').style.display = 'none';
  document.getElementById('failedBox').style.display = 'none';
  excludedEntries = [];
  renderExcluded();

  var startAddrStr = document.getElementById('startAddr').value.trim();
  var goalSame = document.getElementById('goalSameAsStart').checked;
  var goalAddrStr = goalSame ? startAddrStr : document.getElementById('goalAddr').value.trim();
  var rawLines = document.getElementById('addrInput').value
    .split('\n')
    .map(function(l) { return l.trim(); })
    .filter(function(l) { return l.length > 0; });
  // タブ区切り（スプレッドシート貼り付け）対応: 名前・住所・種別 or 住所のみ
  var lineInfos = rawLines.map(function(l) {
    var parts = l.split('\t');
    if (parts.length >= 2) {
      return { addr: parts[1].trim(), name: parts[0].trim(), vacId: parts[2] ? parts[2].trim() : '', type: parts[3] ? parts[3].trim() : '' };
    }
    return { addr: l, name: '', type: '' };
  });

  if (lineInfos.length === 0) {
    setStatus('住所を1件以上入力してください', 'error');
    btn.disabled = false;
    return;
  }
  if (lineInfos.length > 30) {
    setStatus('住所は30件以内にしてください', 'error');
    btn.disabled = false;
    return;
  }

  var geocodeCount = lineInfos.length + (startAddrStr ? 1 : 0) + (goalAddrStr && !goalSame ? 1 : 0);
  var doneCount = 0;
  function progress() {
    doneCount++;
    setStatus('住所を検索中... (' + doneCount + '/' + geocodeCount + ')');
  }
  setStatus('住所を検索中... (0/' + geocodeCount + ')');

  // 出発地のジオコーディング
  var startPoint = null;
  if (startAddrStr) {
    startPoint = await geocode(startAddrStr);
    if (!startPoint) {
      setStatus('出発地の住所が見つかりませんでした: ' + startAddrStr, 'error');
      btn.disabled = false;
      return;
    }
    startPoint.original = startAddrStr;
    startPoint.isStart = true;
    progress();
  }

  // ゴール地点のジオコーディング（出発地と別の場合）
  var goalPoint = null;
  if (goalAddrStr && !goalSame) {
    goalPoint = await geocode(goalAddrStr);
    if (!goalPoint) {
      setStatus('ゴール地点の住所が見つかりませんでした: ' + goalAddrStr, 'error');
      btn.disabled = false;
      return;
    }
    goalPoint.original = goalAddrStr;
    goalPoint.isGoal = true;
    progress();
  } else if (goalSame && startPoint) {
    goalPoint = Object.assign({}, startPoint, { isGoal: true, isStart: false });
  }

  // 訪問先のジオコーディング（並列・失敗はスキップして続行）
  var results = await geocodeAll(lineInfos, progress);
  var points = [];
  var failedAddrs = [];
  for (var i = 0; i < lineInfos.length; i++) {
    var p = results[i];
    if (!p) {
      failedAddrs.push(lineInfos[i].addr);
      continue;
    }
    p.original = lineInfos[i].addr;
    p.name = lineInfos[i].name;
    p.vacId = lineInfos[i].vacId;
    p.type = lineInfos[i].type;
    points.push(p);
  }

  if (points.length === 0) {
    setStatus('住所が1件も見つかりませんでした', 'error');
    btn.disabled = false;
    return;
  }

  if (failedAddrs.length > 0) {
    var box = document.getElementById('failedBox');
    box.innerHTML = '';
    var title = document.createElement('div');
    title.className = 'failed-title';
    title.textContent = '見つからなかった住所（' + failedAddrs.length + '件・除外して計算）:';
    box.appendChild(title);
    failedAddrs.forEach(function(a) {
      var d = document.createElement('div');
      d.textContent = '・' + a;
      box.appendChild(d);
    });
    box.style.display = 'block';
  }

  setStatus('ルートを計算中...');

  // キャッシュに保存
  cachedStartPoint = startPoint;
  cachedGoalPoint = goalPoint;
  cachedGoalSame = goalSame;
  cachedPoints = points;

  drawRoute();
  setStatus('完了 — ' + points.length + '件のルートを最適化しました'
    + (failedAddrs.length > 0 ? '（' + failedAddrs.length + '件は住所が見つからず除外）' : ''), 'ok');
  btn.disabled = false;
}

function excludePoint(originalAddr) {
  var removedPoint = null;
  cachedPoints = cachedPoints.filter(function(p) {
    if (p.original === originalAddr) {
      if (!removedPoint) removedPoint = p;
      return false;
    }
    return true;
  });
  // テキストエリアからも除去（元の行は「戻す」用に保持）
  var removedLine = null;
  var ta = document.getElementById('addrInput');
  ta.value = ta.value.split('\n')
    .filter(function(l) {
      var parts = l.split('\t');
      var addr = parts.length >= 2 ? parts[1].trim() : l.trim();
      if (addr === originalAddr) {
        if (removedLine === null) removedLine = l;
        return false;
      }
      return true;
    })
    .join('\n');
  if (removedPoint) {
    excludedEntries.push({ point: removedPoint, line: removedLine !== null ? removedLine : originalAddr });
  }
  saveInputs();
  renderExcluded();
  if (cachedPoints.length === 0) {
    clearMap();
    lastTotals = null;
    roadReqId++;
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('resultDivider').style.display = 'none';
    setStatus('訪問先がなくなりました', 'error');
    return;
  }
  drawRoute();
  setStatus('除外後に再計算しました（' + cachedPoints.length + '件）', 'ok');
}

function restorePoint(idx) {
  var entry = excludedEntries.splice(idx, 1)[0];
  if (!entry) return;
  cachedPoints.push(entry.point);
  // テキストエリアにも戻す
  var ta = document.getElementById('addrInput');
  ta.value = (ta.value.trim() ? ta.value + '\n' : '') + entry.line;
  saveInputs();
  renderExcluded();
  drawRoute();
  setStatus('「' + entry.point.original + '」を戻して再計算しました（' + cachedPoints.length + '件）', 'ok');
}

function renderExcluded() {
  var area = document.getElementById('excludedArea');
  var list = document.getElementById('excludedList');
  list.innerHTML = '';
  if (excludedEntries.length === 0) {
    area.style.display = 'none';
    return;
  }
  excludedEntries.forEach(function(entry, idx) {
    var li = document.createElement('li');
    var addrDiv = document.createElement('div');
    addrDiv.className = 'addr-text excluded-addr';
    addrDiv.textContent = entry.point.original;
    if (entry.point.name || entry.point.vacId || entry.point.type) {
      var infoDiv = document.createElement('div');
      infoDiv.className = 'addr-info';
      infoDiv.textContent = [entry.point.name, entry.point.vacId, entry.point.type].filter(Boolean).join(' ｜ ');
      addrDiv.appendChild(infoDiv);
    }
    li.appendChild(addrDiv);
    var btn = document.createElement('button');
    btn.className = 'btn-exclude btn-restore';
    btn.textContent = '戻す';
    btn.addEventListener('click', function() { restorePoint(idx); });
    li.appendChild(btn);
    list.appendChild(li);
  });
  area.style.display = 'block';
}

function makeBadgeIcon(color, label) {
  return L.divIcon({
    html: '<div style="background:' + color + ';color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3)">' + label + '</div>',
    iconSize: [28, 28], iconAnchor: [14, 14], className: ''
  });
}

function drawRoute() {
  clearMap();
  var startPoint = cachedStartPoint;
  var goalPoint = cachedGoalPoint;
  var points = cachedPoints;

  var base = startPoint || points[0];
  var targets = startPoint ? points : points.slice(1);
  var ordered = computeRoute(base, targets, goalPoint);
  var total = totalDist(ordered, goalPoint);

  var routeWithGoal = goalPoint ? ordered.concat([goalPoint]) : ordered;
  var latlngs = routeWithGoal.map(function(p) { return [p.lat, p.lng]; });

  var pl = L.polyline(latlngs, { color: '#2563eb', weight: 3, opacity: 0.7 }).addTo(map);
  polylines.push(pl);

  ordered.forEach(function(p, idx) {
    var isStart = idx === 0 && startPoint;
    var visited = !isStart && visitedAddrs[p.original];
    var color = isStart ? '#16a34a' : (visited ? '#9ca3af' : '#2563eb');
    var label = isStart ? 'S' : String(idx + (startPoint ? 0 : 1));
    var m = L.marker([p.lat, p.lng], { icon: makeBadgeIcon(color, label) })
      .addTo(map)
      .bindPopup('<b>' + (isStart ? '出発地' : '訪問先 ' + label) + '</b><br>' + p.original + ((!isStart && (p.name || p.vacId || p.type)) ? '<br><span style="font-size:12px;color:#555">' + [p.name, p.vacId, p.type].filter(Boolean).join(' ｜ ') + '</span>' : ''));
    markers.push(m);
    if (!isStart) markerByAddr[p.original] = { marker: m, label: label };
  });

  if (goalPoint && !cachedGoalSame) {
    var gm = L.marker([goalPoint.lat, goalPoint.lng], { icon: makeBadgeIcon('#dc2626', 'G') })
      .addTo(map)
      .bindPopup('<b>ゴール地点</b><br>' + goalPoint.original);
    markers.push(gm);
  }

  map.fitBounds(pl.getBounds(), { padding: [30, 30] });

  var list = document.getElementById('routeList');
  list.innerHTML = '';
  routeWithGoal.forEach(function(p, idx) {
    var isStart = idx === 0 && startPoint;
    var isGoalEntry = goalPoint && idx === routeWithGoal.length - 1;
    var num = isStart ? 'S' : (isGoalEntry ? 'G' : String(idx + (startPoint ? 0 : 1)));
    var badgeClass = isStart ? 'start' : (isGoalEntry ? 'goal' : '');
    var nextP = idx < routeWithGoal.length - 1 ? routeWithGoal[idx + 1] : null;

    var li = document.createElement('li');

    // 訪問先の行だけチェックボックスを付ける（S・Gは幅合わせのスペーサー）
    if (!isStart && !isGoalEntry) {
      var chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.className = 'visit-check';
      chk.title = '訪問済み';
      chk.checked = !!visitedAddrs[p.original];
      if (chk.checked) li.classList.add('visited');
      chk.addEventListener('change', (function(addr, liEl) {
        return function() { setVisited(addr, liEl, this.checked); };
      })(p.original, li));
      li.appendChild(chk);
    } else {
      var spacer = document.createElement('span');
      spacer.className = 'visit-spacer';
      li.appendChild(spacer);
    }

    var badge = document.createElement('div');
    badge.className = 'badge' + (badgeClass ? ' ' + badgeClass : '');
    badge.textContent = num;
    li.appendChild(badge);

    var addrDiv = document.createElement('div');
    addrDiv.className = 'addr-text';
    var addrLink = document.createElement('a');
    addrLink.className = 'addr-link';
    addrLink.href = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(p.lat + ',' + p.lng);
    addrLink.target = '_blank';
    addrLink.rel = 'noopener';
    addrLink.textContent = p.original;
    addrDiv.appendChild(addrLink);
    if (p.label) {
      var matchDiv = document.createElement('div');
      matchDiv.className = 'addr-match';
      matchDiv.textContent = '照合: ' + p.label;
      addrDiv.appendChild(matchDiv);
    }
    if (p.name || p.vacId || p.type) {
      var infoDiv = document.createElement('div');
      infoDiv.className = 'addr-info';
      infoDiv.textContent = [p.name, p.vacId, p.type].filter(Boolean).join(' ｜ ');
      addrDiv.appendChild(infoDiv);
    }
    if (nextP) {
      var distDiv = document.createElement('div');
      distDiv.className = 'dist';
      distDiv.textContent = '次まで: ' + dist(p, nextP).toFixed(1) + ' km';
      addrDiv.appendChild(distDiv);
    }
    li.appendChild(addrDiv);

    if (!isStart && !isGoalEntry) {
      var exBtn = document.createElement('button');
      exBtn.className = 'btn-exclude';
      exBtn.textContent = '除外';
      exBtn.addEventListener('click', (function(addr) {
        return function() { excludePoint(addr); };
      })(p.original));
      li.appendChild(exBtn);
    }

    list.appendChild(li);
  });

  var visitCount = ordered.length - (startPoint ? 1 : 0);
  lastTotals = { straightKm: total, visitCount: visitCount, hasGoal: !!goalPoint, road: null };
  renderTotals();
  // 実道路の距離・所要時間を非同期で取得して差し替える
  var reqId = ++roadReqId;
  fetchRoadInfo(routeWithGoal).then(function(r) {
    if (r && reqId === roadReqId && lastTotals) {
      lastTotals.road = r;
      renderTotals();
    }
  });

  renderNavButtons(routeWithGoal, startPoint, goalPoint);
  renderVisitedProgress();

  document.getElementById('resultArea').style.display = 'block';
  document.getElementById('resultDivider').style.display = 'block';
  document.getElementById('pdfBtn').style.display = 'block';
  document.getElementById('qrBtn').style.display = 'block';
  document.getElementById('mailBtn').style.display = 'block';
  document.getElementById('shareBtn').style.display = 'block';
}

// 訪問済みチェックの切り替え: リストの見た目・地図ピンの色・進捗表示を更新する
function setVisited(addr, li, checked) {
  if (checked) visitedAddrs[addr] = true;
  else delete visitedAddrs[addr];
  saveVisited();
  li.classList.toggle('visited', checked);
  var entry = markerByAddr[addr];
  if (entry) entry.marker.setIcon(makeBadgeIcon(checked ? '#9ca3af' : '#2563eb', entry.label));
  renderVisitedProgress();
}

function renderVisitedProgress() {
  var el = document.getElementById('visitedRow');
  var total = cachedPoints.length;
  if (total === 0) {
    el.style.display = 'none';
    return;
  }
  var done = cachedPoints.filter(function(p) { return visitedAddrs[p.original]; }).length;
  el.textContent = '訪問済み ' + done + ' / ' + total + ' 件';
  el.style.display = 'block';
}

// Googleマップのナビリンクを生成（経由地は最大9件なので超える場合は区間分割）
function gmapsDirUrl(seg) {
  var fmt = function(p) { return p.lat + ',' + p.lng; };
  var mode = document.getElementById('travelMode').value === 'walk' ? 'walking' : 'driving';
  var url = 'https://www.google.com/maps/dir/?api=1'
    + '&origin=' + encodeURIComponent(fmt(seg[0]))
    + '&destination=' + encodeURIComponent(fmt(seg[seg.length - 1]))
    + '&travelmode=' + mode;
  if (seg.length > 2) {
    url += '&waypoints=' + encodeURIComponent(seg.slice(1, -1).map(fmt).join('|'));
  }
  return url;
}

function renderNavButtons(routeWithGoal, startPoint, goalPoint) {
  var navArea = document.getElementById('navArea');
  navArea.innerHTML = '';
  if (routeWithGoal.length < 2) return;

  function ptLabel(idx) {
    var isS = idx === 0 && startPoint;
    var isG = goalPoint && idx === routeWithGoal.length - 1;
    return isS ? 'S' : (isG ? 'G' : String(idx + (startPoint ? 0 : 1)));
  }

  // 1区間 = 出発 + 経由地9件 + 目的地（計11地点）。区間の終点が次区間の起点になる
  var segs = [];
  var i = 0;
  while (i < routeWithGoal.length - 1) {
    var end = Math.min(i + 10, routeWithGoal.length - 1);
    segs.push({ from: i, to: end, pts: routeWithGoal.slice(i, end + 1) });
    i = end;
  }

  segs.forEach(function(seg, sIdx) {
    var a = document.createElement('a');
    a.className = 'btn-nav';
    a.href = gmapsDirUrl(seg.pts);
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = segs.length === 1
      ? 'Googleマップでナビ開始'
      : 'ナビ 区間' + (sIdx + 1) + '（' + ptLabel(seg.from) + ' → ' + ptLabel(seg.to) + '）';
    navArea.appendChild(a);
  });
}

function sendEmail() {
  var startPoint = cachedStartPoint;
  var goalPoint  = cachedGoalPoint;
  var points     = cachedPoints;
  if (!points || points.length === 0) return;

  var base = startPoint || points[0];
  var targets = startPoint ? points : points.slice(1);
  var ordered = computeRoute(base, targets, goalPoint);
  var routeWithGoal = goalPoint ? ordered.concat([goalPoint]) : ordered;

  var now = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  var dateStr = now.getFullYear() + '/' + pad(now.getMonth()+1) + '/' + pad(now.getDate());

  var lines = ['営業ルート最適化', dateStr, ''];
  if (startPoint) lines.push('【出発地】' + startPoint.original, '');
  routeWithGoal.forEach(function(p, idx) {
    var isStart = idx === 0 && startPoint;
    var isGoalEntry = goalPoint && idx === routeWithGoal.length - 1;
    if (isStart) return;
    var num = isGoalEntry ? 'ゴール' : String(idx + (startPoint ? 0 : 1));
    var label = isGoalEntry ? '【ゴール】' : '(' + num + ') ';
    var info = label + p.original;
    if (p.name || p.vacId || p.type) info += '\n      ' + [p.name, p.vacId, p.type].filter(Boolean).join(' | ');
    var nextP = idx < routeWithGoal.length - 1 ? routeWithGoal[idx + 1] : null;
    if (nextP) info += '\n      → 次まで ' + dist(p, nextP).toFixed(1) + ' km';
    lines.push(info, '');
  });

  var visitCount = ordered.length - (startPoint ? 1 : 0);
  var total = totalDist(ordered, goalPoint);
  var tl = totalsLines();
  if (tl.length) {
    lines.push('');
    tl.forEach(function(t) { lines.push(t); });
  } else {
    lines.push('', '合計距離（直線）: ' + total.toFixed(1) + ' km / 訪問 ' + visitCount + '件');
  }

  var bodyText = lines.join('\n');
  var subject = encodeURIComponent(dateStr + ' 営業ルート');
  var url = 'mailto:?subject=' + subject + '&body=' + encodeURIComponent(bodyText);
  // mailto URLが長すぎるとメーラーが開けないことがあるため、クリップボード経由に切り替える
  if (url.length > 1800) {
    copyText(bodyText).then(function() {
      alert('件数が多く本文をURLで渡せないため、ルートをクリップボードにコピーしました。\n開いたメールの本文に貼り付けてください。');
      openMailto('mailto:?subject=' + subject);
    });
    return;
  }
  openMailto(url);
}

function openMailto(url) {
  location.href = url;
}

function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text);
  }
  // 非HTTPS環境用フォールバック
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
  return Promise.resolve();
}

// QRコードをブラウザ内で生成（住所データを外部サービスに送らない）
function makeQRDataURL(text) {
  if (qrcode.stringToBytesFuncs && qrcode.stringToBytesFuncs['UTF-8']) {
    qrcode.stringToBytes = qrcode.stringToBytesFuncs['UTF-8'];
  }
  var qr = qrcode(0, 'L');
  qr.addData(text, 'Byte');
  qr.make();
  // 画像がおよそ700pxになるようにセルサイズを決める（余白は4セル分）
  var cellSize = Math.max(3, Math.round(700 / qr.getModuleCount()));
  return qr.createDataURL(cellSize, cellSize * 4);
}

// 入力内容（出発地・ゴール・住所リスト）をパラメータに埋め込んだ共有用URLを作る
// QRコードと「スマホに送る」の両方で使う
function buildShareURL() {
  var startAddr = document.getElementById('startAddr').value.trim();
  var goalSame  = document.getElementById('goalSameAsStart').checked;
  var goalAddr  = document.getElementById('goalAddr').value.trim();
  var lines = document.getElementById('addrInput').value
    .split('\n').filter(function(l) { return l.trim(); });

  var params = new URLSearchParams();
  if (startAddr) params.set('s', startAddr);
  params.set('gs', goalSame ? '1' : '0');
  if (!goalSame && goalAddr) params.set('g', goalAddr);
  if (lines.length) {
    var b64 = btoa(unescape(encodeURIComponent(lines.join('|'))))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    params.set('a', b64);
  }
  // file://で開いているときは公開サイトのURLで共有する
  var base = location.protocol === 'file:'
    ? 'https://hkmail1162-coder.github.io/eigyouroot-app/'
    : location.href.split('?')[0];
  return base + '?' + params.toString();
}

// スマホに送る: 共有シート（LINE・メール等）でURLを送信。非対応ブラウザはコピーにフォールバック
function shareRoute() {
  var url = buildShareURL();
  var now = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  var title = now.getFullYear() + '/' + pad(now.getMonth()+1) + '/' + pad(now.getDate()) + ' 営業ルート';
  if (navigator.share) {
    navigator.share({ title: title, url: url }).catch(function() {});
  } else {
    copyText(url).then(function() {
      alert('このブラウザは共有機能に対応していないため、URLをコピーしました。\nLINEやメールに貼り付けてスマホに送ってください。');
    });
  }
}

function showQR() {
  var lines = document.getElementById('addrInput').value
    .split('\n').filter(function(l) { return l.trim(); });

  var qrData, noteText, titleText;

  if (location.protocol !== 'file:') {
    // HTTP経由: base64圧縮してURLに埋め込む
    qrData = buildShareURL();
    titleText = 'スマホで開く';
    noteText = 'スキャンで住所・設定が自動入力されます<br>訪問先 ' + lines.length + '件';
  } else {
    // file://直接開き: 全データをテキストQRに変換
    qrData = lines.join('\n');
    titleText = '住所リストをスキャン';
    noteText = 'スキャン後にテキストをコピーして、スマホのアプリの住所欄に貼り付けてください';
  }

  var now = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  var dateStr = now.getFullYear() + '/' + pad(now.getMonth()+1) + '/' + pad(now.getDate())
    + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());
  var uid = 'QR-' + now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate())
    + '-' + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());

  document.getElementById('qrTitle').textContent = titleText;
  var img = document.getElementById('qrImg');
  try {
    img.src = makeQRDataURL(qrData);
    img.style.display = '';
    document.getElementById('qrNote').innerHTML = noteText;
  } catch (e) {
    img.style.display = 'none';
    document.getElementById('qrNote').innerHTML = 'データ量が多すぎてQRコードを生成できませんでした。件数を減らしてください';
  }
  document.getElementById('qrMeta').innerHTML = dateStr + '<br>' + uid;
  document.getElementById('qrModal').style.display = 'flex';
}

function closeQR() {
  document.getElementById('qrModal').style.display = 'none';
}

// 入力の復元と自動保存の設定
(function() {
  // 前回の入力を localStorage から復元
  loadInputs();

  // URLパラメータがあればそちらを優先（QRコード経由）
  if (location.protocol !== 'file:') {
    var params = new URLSearchParams(location.search);
    if (params.get('s')) document.getElementById('startAddr').value = params.get('s');
    if (params.get('gs') === '0') {
      document.getElementById('goalSameAsStart').checked = false;
      toggleGoalInput();
    } else if (params.get('gs') === '1') {
      document.getElementById('goalSameAsStart').checked = true;
      toggleGoalInput();
    }
    if (params.get('g')) document.getElementById('goalAddr').value = params.get('g');
    if (params.get('a')) {
      try {
        var b64 = params.get('a').replace(/-/g, '+').replace(/_/g, '/');
        while (b64.length % 4) b64 += '=';
        var decoded = decodeURIComponent(escape(atob(b64)));
        document.getElementById('addrInput').value = decoded.split('|').join('\n');
      } catch (e) {
        document.getElementById('addrInput').value = params.get('a').split('|').join('\n');
      }
    }
    if (params.get('a') && params.get('s')) {
      window.addEventListener('load', function() { calcRoute(); });
    }
  }

  // 入力のたびに自動保存
  ['startAddr', 'goalAddr', 'addrInput'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', saveInputs);
  });
  document.getElementById('goalSameAsStart').addEventListener('change', saveInputs);
  // 滞在時間の変更は所要時間の表示に即反映
  document.getElementById('stayMin').addEventListener('input', function() {
    saveInputs();
    renderTotals();
  });

  // QRパラメータで復元した内容も保存しておく
  saveInputs();
})();
</script>
